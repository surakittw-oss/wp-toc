<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WP TOC Generator</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0d0d0d;
    --surface:  #161616;
    --border:   #2a2a2a;
    --muted:    #555;
    --text:     #e8e8e8;
    --sub:      #888;
    --red:      #e62227;
    --red-dim:  rgba(230,34,39,0.12);
    --green:    #22c55e;
    --radius:   10px;
    --mono:     'IBM Plex Mono', monospace;
    --sans:     'IBM Plex Sans Thai', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr auto;
  }

  /* ── HEADER ── */
  header {
    border-bottom: 1px solid var(--border);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: rgba(13,13,13,0.92);
    backdrop-filter: blur(12px);
    z-index: 10;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.5px;
  }
  .logo-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--red);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(0.85); }
  }
  .logo-name { color: var(--text); }
  .logo-tag {
    color: var(--sub);
    font-size: 11px;
    padding: 2px 8px;
    border: 1px solid var(--border);
    border-radius: 20px;
  }

  /* ── MAIN LAYOUT ── */
  main {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    max-width: 1400px;
    width: 100%;
    margin: 0 auto;
    padding: 32px;
    gap: 24px;
  }

  /* ── PANELS ── */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .panel-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .panel-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--sub);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .panel-title::before {
    content: '';
    width: 3px; height: 14px;
    background: var(--red);
    border-radius: 2px;
  }
  .panel-body {
    padding: 20px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* ── CATEGORY SELECTOR ── */
  .category-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--sub);
    margin-bottom: 10px;
  }
  .category-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .cat-btn {
    padding: 10px 8px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: transparent;
    color: var(--sub);
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    position: relative;
    overflow: hidden;
  }
  .cat-btn::before {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: var(--cat-color, var(--border));
    transform: scaleX(0);
    transition: transform 0.15s ease;
  }
  .cat-btn:hover { border-color: #444; color: var(--text); }
  .cat-btn:hover::before { transform: scaleX(0.5); }
  .cat-btn.active {
    border-color: var(--cat-color, var(--red));
    background: rgba(255,255,255,0.03);
    color: var(--text);
  }
  .cat-btn.active::before { transform: scaleX(1); }
  .cat-icon {
    width: 20px; height: 4px;
    border-radius: 2px;
    background: var(--cat-color, var(--border));
  }
  .cat-name { font-size: 11px; text-align: center; line-height: 1.3; }

  /* ── TEXTAREA ── */
  textarea {
    width: 100%;
    flex: 1;
    min-height: 280px;
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.65;
    padding: 14px 16px;
    resize: vertical;
    transition: border-color 0.15s;
    outline: none;
  }
  textarea:focus { border-color: #444; }
  textarea::placeholder { color: var(--muted); font-size: 13px; }

  /* ── DETECTED H2 TAGS ── */
  .h2-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .h2-chip {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    background: var(--red-dim);
    border: 1px solid rgba(230,34,39,0.2);
    border-radius: 6px;
    font-size: 13px;
    animation: slideIn 0.2s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-8px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  .h2-num {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--red);
    min-width: 20px;
    font-weight: 500;
  }
  .h2-text { color: var(--text); flex: 1; font-size: 12px; }
  .h2-id {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--sub);
    padding: 2px 6px;
    background: rgba(255,255,255,0.05);
    border-radius: 4px;
  }

  /* ── GENERATE BUTTON ── */
  .btn-generate {
    width: 100%;
    padding: 14px;
    background: var(--red);
    border: none;
    border-radius: 8px;
    color: white;
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.15s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-generate:hover { background: #c91e23; transform: translateY(-1px); }
  .btn-generate:active { transform: translateY(0); }
  .btn-generate:disabled { background: var(--muted); cursor: not-allowed; transform: none; }

  /* ── OUTPUT TABS ── */
  .tab-row {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
  }
  .tab {
    padding: 12px 20px;
    font-size: 12px;
    font-weight: 500;
    color: var(--sub);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
    font-family: var(--sans);
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--red); border-bottom-color: var(--red); }

  /* ── CODE OUTPUT ── */
  .code-wrap {
    position: relative;
    flex: 1;
    display: flex;
    flex-direction: column;
  }
  .code-output {
    flex: 1;
    min-height: 380px;
    padding: 16px;
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.7;
    color: #ccc;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-all;
    outline: none;
  }
  .code-output.empty {
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-family: var(--sans);
    font-size: 13px;
    font-style: italic;
  }

  .btn-copy {
    padding: 8px 16px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: transparent;
    color: var(--sub);
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .btn-copy:hover { border-color: var(--green); color: var(--green); }
  .btn-copy.copied { border-color: var(--green); color: var(--green); background: rgba(34,197,94,0.08); }

  /* ── STATUS BAR ── */
  .status-bar {
    padding: 8px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
  }
  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    display: inline-block;
    margin-right: 6px;
  }

  /* ── FOOTER ── */
  footer {
    border-top: 1px solid var(--border);
    padding: 14px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 11px;
    color: var(--muted);
  }

  /* ── EMPTY STATE ── */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    color: var(--muted);
    font-size: 13px;
    padding: 40px;
    text-align: center;
  }
  .empty-icon {
    width: 40px; height: 40px;
    border: 1px dashed var(--border);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    margin-bottom: 4px;
  }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    padding: 12px 20px;
    background: var(--surface);
    border: 1px solid var(--green);
    border-radius: 8px;
    font-size: 13px;
    color: var(--green);
    display: flex;
    align-items: center;
    gap: 8px;
    z-index: 100;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.25s ease;
    pointer-events: none;
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  /* ── INSTRUCTION STEPS ── */
  .steps {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 4px;
  }
  .step {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    font-size: 12px;
    color: var(--sub);
    line-height: 1.5;
  }
  .step-num {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--red);
    background: var(--red-dim);
    border-radius: 4px;
    padding: 2px 6px;
    min-width: 22px;
    text-align: center;
    margin-top: 1px;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <div class="logo-dot"></div>
    <span class="logo-name">WP TOC Generator</span>
    <span class="logo-tag">Classic Editor</span>
  </div>
  <div style="font-size:11px; color:var(--muted); font-family:var(--mono)">
    0 token · runs in browser
  </div>
</header>

<!-- MAIN -->
<main>

  <!-- LEFT PANEL: INPUT -->
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">Input</span>
      <span style="font-size:11px; color:var(--muted); font-family:var(--mono)" id="h2-count">0 H2 detected</span>
    </div>
    <div class="panel-body">

      <!-- CATEGORY -->
      <div>
        <div class="category-label">เลือกหมวดข่าว</div>
        <div class="category-grid" id="cat-grid">
          <button class="cat-btn active" data-cat="TSD" style="--cat-color:#e62227">
            <div class="cat-icon"></div>
            <span class="cat-name">TSD</span>
          </button>
          <button class="cat-btn" data-cat="TSD POP" style="--cat-color:#0000ff">
            <div class="cat-icon"></div>
            <span class="cat-name">TSD POP</span>
          </button>
          <button class="cat-btn" data-cat="TSD Wealth" style="--cat-color:#c19380">
            <div class="cat-icon"></div>
            <span class="cat-name">TSD Wealth</span>
          </button>
          <button class="cat-btn" data-cat="LIFE" style="--cat-color:#555">
            <div class="cat-icon"></div>
            <span class="cat-name">LIFE</span>
          </button>
          <button class="cat-btn" data-cat="TSD SPORT" style="--cat-color:#ffa5f7">
            <div class="cat-icon"></div>
            <span class="cat-name">TSD SPORT</span>
          </button>
          <button class="cat-btn" data-cat="The Secret Sauce" style="--cat-color:#ffcd00">
            <div class="cat-icon"></div>
            <span class="cat-name">The Secret Sauce</span>
          </button>
        </div>
      </div>

      <!-- TEXTAREA -->
      <div style="display:flex; flex-direction:column; gap:6px; flex:1">
        <div class="category-label">วางบทความ หรือพิมพ์หัวข้อ H2</div>
        <textarea
          id="input-text"
          placeholder="วางบทความทั้งหมดที่นี่ — Claude จะ detect H2 ให้อัตโนมัติ&#10;&#10;หรือพิมพ์หัวข้อตรงๆ เช่น:&#10;## Apple ประกาศ iPhone 17&#10;## ราคาและวันวางจำหน่าย&#10;## สเปคและฟีเจอร์ใหม่"
        ></textarea>
      </div>

      <!-- DETECTED H2 -->
      <div id="h2-preview" style="display:none">
        <div class="category-label" style="margin-bottom:8px">H2 ที่ตรวจพบ</div>
        <div class="h2-list" id="h2-list"></div>
      </div>

      <!-- GENERATE BUTTON -->
      <button class="btn-generate" id="btn-gen" disabled>
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
        Generate TOC + H2
      </button>

    </div>
  </div>

  <!-- RIGHT PANEL: OUTPUT -->
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">Output</span>
      <div style="display:flex; gap:8px">
        <button class="btn-copy" id="btn-copy-all" style="display:none" onclick="copyAll()">
          <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          Copy ทั้งหมด
        </button>
      </div>
    </div>

    <!-- TABS -->
    <div class="tab-row" id="tab-row" style="display:none">
      <button class="tab active" onclick="switchTab('h2')" id="tab-h2">
        H2 + id= + style
      </button>
      <button class="tab" onclick="switchTab('toc')" id="tab-toc">
        TOC Block
      </button>
      <button class="tab" onclick="switchTab('guide')" id="tab-guide">
        วิธีใช้
      </button>
    </div>

    <div class="panel-body" id="output-body">
      <!-- EMPTY STATE -->
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">✦</div>
        <div>วาง H2 และเลือกหมวดข่าว</div>
        <div style="font-size:11px; color:var(--muted)">จากนั้นกด Generate</div>
      </div>
    </div>

    <div class="status-bar" id="status-bar" style="display:none">
      <span><span class="status-dot"></span><span id="status-text">พร้อมใช้งาน</span></span>
      <span id="status-cat" style="font-family:var(--mono)">—</span>
    </div>
  </div>

</main>

<!-- FOOTER -->
<footer>
  <span>WP TOC Generator — WordPress Classic Editor</span>
  <span style="font-family:var(--mono)">0 token · no API · static app</span>
</footer>

<!-- TOAST -->
<div class="toast" id="toast">
  <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
  <span id="toast-msg">Copied!</span>
</div>

<script>
// ── STYLE MAP ──────────────────────────────────────────
const STYLES = {
  'TSD':              'border-left: 12px solid #e62227; padding-left: 15px; background-color: #F8F8F8; padding: 10px;',
  'TSD POP':          'border-left: 12px solid #0000ff; padding-left: 15px; background-color: #F8F8F8; padding: 10px;',
  'TSD Wealth':       'border-left: 12px solid #c19380; padding-left: 15px; background-color: #F8F8F8; padding: 10px;',
  'LIFE':             'border-left: 12px solid #000000; padding-left: 15px; background-color: #F8F8F8; padding: 10px;',
  'TSD SPORT':        'border-left: 12px solid #ffa5f7; padding-left: 15px; background-color: #F8F8F8; padding: 10px;',
  'The Secret Sauce': 'border-left: 13px solid #ffcd00; padding-left: 15px; background: rgba(255, 255, 255, 0.25); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); padding: 10px; border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); color: #000;'
}

// ── STATE ──────────────────────────────────────────────
let selectedCat = 'TSD'
let detectedH2  = []
let outputs     = { h2: '', toc: '' }
let activeTab   = 'h2'

// ── EXTRACT H2 ─────────────────────────────────────────
function extractH2(text) {
  const lines = text.split('\n')
  const result = []

  for (const line of lines) {
    const trimmed = line.trim()

    // Markdown: ## หัวข้อ
    const mdMatch = trimmed.match(/^#{1,2}\s+(.+)$/)
    if (mdMatch) { result.push(mdMatch[1].trim()); continue }

    // HTML: <h2>หัวข้อ</h2> หรือ <h2 ...>หัวข้อ</h2>
    const htmlMatch = trimmed.match(/<h2[^>]*>([^<]+)<\/h2>/i)
    if (htmlMatch) { result.push(htmlMatch[1].trim()); continue }

    // Plain text ที่มีแค่ข้อความ + บรรทัดก่อนหน้าว่าง (heuristic)
    // ไม่ใช้ heuristic เพื่อป้องกัน false positive
  }

  return result
}

// ── BUILD OUTPUT ───────────────────────────────────────
function buildH2Output(headings, cat) {
  const style = STYLES[cat]
  return headings.map((h, i) =>
    `<h2 id="section${i+1}" style="${style}">${h}</h2>`
  ).join('\n')
}

function buildTOCOutput(headings) {
  const items = headings.map((h, i) =>
    `    <li style="margin:8px 0; overflow-wrap: break-word; word-break: normal;"><a href="#section${i+1}">${h}</a></li>`
  ).join('\n')

  return `<div style="
  background: #fff;
  border-radius: 16px;
  padding: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.12);
  max-width: 600px;
">
  <div style="margin-bottom: 12px;">
    <h2 style="font-size: 22px; font-weight: 700;">ประเด็นสำคัญ</h2>
    <div style="height: 6px; background-color: #e62227; margin-top: 6px; width: 100%;"></div>
  </div>
  <ul style="padding-left: 20px; margin: 0; list-style: disc;">
${items}
  </ul>
</div>`
}

// ── RENDER DETECTED H2 ────────────────────────────────
function renderH2Preview(headings) {
  const list = document.getElementById('h2-list')
  const preview = document.getElementById('h2-preview')
  const count = document.getElementById('h2-count')

  count.textContent = headings.length + ' H2 detected'

  if (headings.length === 0) {
    preview.style.display = 'none'
    document.getElementById('btn-gen').disabled = true
    return
  }

  list.innerHTML = headings.map((h, i) => `
    <div class="h2-chip">
      <span class="h2-num">${String(i+1).padStart(2,'0')}</span>
      <span class="h2-text">${escHtml(h)}</span>
      <span class="h2-id">section${i+1}</span>
    </div>
  `).join('')

  preview.style.display = 'block'
  document.getElementById('btn-gen').disabled = false
}

// ── GENERATE ──────────────────────────────────────────
function generate() {
  if (detectedH2.length === 0) return

  outputs.h2  = buildH2Output(detectedH2, selectedCat)
  outputs.toc = buildTOCOutput(detectedH2)

  // Show tabs + output
  document.getElementById('empty-state').style.display = 'none'
  document.getElementById('tab-row').style.display = 'flex'
  document.getElementById('btn-copy-all').style.display = 'flex'
  document.getElementById('status-bar').style.display = 'flex'
  document.getElementById('status-text').textContent = `สร้างสำเร็จ · ${detectedH2.length} หัวข้อ`
  document.getElementById('status-cat').textContent = selectedCat

  switchTab(activeTab)
  showToast('สร้าง TOC สำเร็จแล้ว!')
}

// ── TABS ──────────────────────────────────────────────
function switchTab(tab) {
  activeTab = tab
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'))
  document.getElementById('tab-' + tab).classList.add('active')

  const body = document.getElementById('output-body')

  if (tab === 'h2') {
    body.innerHTML = `
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
        <span style="font-size:11px; color:var(--sub); text-transform:uppercase; letter-spacing:1.5px; font-weight:600;">H2 พร้อม id= และ style</span>
        <button class="btn-copy" onclick="copyCode('h2')">Copy</button>
      </div>
      <div class="code-wrap">
        <div class="code-output" id="code-h2">${escHtml(outputs.h2)}</div>
      </div>
      <p style="font-size:11px; color:var(--muted); margin-top:8px;">แทนที่ H2 เดิมในบทความด้วยชุดนี้ทุกอัน</p>
    `
  } else if (tab === 'toc') {
    body.innerHTML = `
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
        <span style="font-size:11px; color:var(--sub); text-transform:uppercase; letter-spacing:1.5px; font-weight:600;">TOC Block (วางบนสุดของบทความ)</span>
        <button class="btn-copy" onclick="copyCode('toc')">Copy</button>
      </div>
      <div class="code-wrap">
        <div class="code-output" id="code-toc">${escHtml(outputs.toc)}</div>
      </div>
      <p style="font-size:11px; color:var(--muted); margin-top:8px;">วาง code นี้ก่อนย่อหน้าแรกของบทความ</p>
    `
  } else if (tab === 'guide') {
    body.innerHTML = `
      <div style="color:var(--sub); font-size:11px; text-transform:uppercase; letter-spacing:1.5px; font-weight:600; margin-bottom:12px;">วิธีใช้งานใน WordPress Classic Editor</div>
      <div class="steps">
        <div class="step"><span class="step-num">01</span><span>เปิด WordPress → เข้าบทความที่ต้องการ → คลิก <strong style="color:var(--text)">Classic Editor</strong></span></div>
        <div class="step"><span class="step-num">02</span><span>กดแท็บ <strong style="color:var(--text)">"Text"</strong> (ไม่ใช่ Visual) เพื่อเข้า HTML mode</span></div>
        <div class="step"><span class="step-num">03</span><span>วาง <strong style="color:var(--text)">TOC Block</strong> ไว้ก่อนย่อหน้าแรกของบทความ</span></div>
        <div class="step"><span class="step-num">04</span><span>ค้นหา H2 เดิมในบทความ (Ctrl+F) → แทนที่ด้วย <strong style="color:var(--text)">H2 ชุดใหม่</strong> ที่มี id= และ style</span></div>
        <div class="step"><span class="step-num">05</span><span>กด <strong style="color:var(--text)">Preview</strong> เพื่อทดสอบว่า anchor link เลื่อนหน้าไปถูก section</span></div>
        <div class="step"><span class="step-num">06</span><span>กด <strong style="color:var(--text)">Publish / Update</strong></span></div>
      </div>
      <div style="margin-top:16px; padding:12px 14px; background:var(--red-dim); border:1px solid rgba(230,34,39,0.2); border-radius:8px; font-size:12px; color:var(--sub); line-height:1.6;">
        ⚠️ ต้องอยู่ใน <strong style="color:var(--text)">Text mode</strong> เท่านั้น ถ้าวางใน Visual mode HTML จะถูก escape และแสดงเป็น code แทน
      </div>
    `
  }
}

// ── COPY ──────────────────────────────────────────────
function copyCode(which) {
  navigator.clipboard.writeText(outputs[which]).then(() => {
    showToast('Copied ' + (which === 'h2' ? 'H2 code' : 'TOC block') + ' แล้ว!')
  })
}

function copyAll() {
  const all = `<!-- H2 พร้อม id= และ style -->\n${outputs.h2}\n\n<!-- TOC Block -->\n${outputs.toc}`
  navigator.clipboard.writeText(all).then(() => showToast('Copied ทั้งหมดแล้ว!'))
}

// ── TOAST ─────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast')
  document.getElementById('toast-msg').textContent = msg
  t.classList.add('show')
  setTimeout(() => t.classList.remove('show'), 2200)
}

// ── ESCAPE HTML ───────────────────────────────────────
function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
}

// ── EVENT LISTENERS ───────────────────────────────────
document.getElementById('input-text').addEventListener('input', function() {
  detectedH2 = extractH2(this.value)
  renderH2Preview(detectedH2)
})

document.getElementById('btn-gen').addEventListener('click', generate)

document.getElementById('cat-grid').addEventListener('click', function(e) {
  const btn = e.target.closest('.cat-btn')
  if (!btn) return
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'))
  btn.classList.add('active')
  selectedCat = btn.dataset.cat
})
</script>
</body>
</html>
